<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Document Platform</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>AI Document Platform</h1>

<div class="upload-box">

<input type="file" id="fileInput">

<button onclick="uploadFile()">Upload</button>

</div>

<textarea id="inputText" placeholder="Uploaded text"></textarea>

<select id="language">

<option>Hindi</option>
<option>French</option>
<option>German</option>
<option>Spanish</option>
<option>Japanese</option>
<option>Russian</option>

</select>

<div class="buttons">

<button onclick="translateText()">Translate</button>

<button onclick="summarizeText()">Summarize</button>

<button onclick="downloadPDF()">Download PDF</button>

<button onclick="copyText()">Copy</button>

<button onclick="clearAll()">Clear</button>

<button onclick="loadHistory()">History</button>

</div>

<div id="output"></div>

<div id="historyBox"></div>

</div>

<script>

async function uploadFile(){

    const fileInput = document.getElementById("fileInput")

    const formData = new FormData()

    formData.append(
        "file",
        fileInput.files[0]
    )

    const response = await fetch("/upload",{
        method:"POST",
        body:formData
    })

    const data = await response.json()

    document.getElementById("inputText").value = data.text
}


async function translateText(){

    const text = document.getElementById("inputText").value

    const language = document.getElementById("language").value

    const response = await fetch("/translate",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            text,
            language
        })

    })

    const data = await response.json()

    document.getElementById("output").innerText = data.result
}


async function summarizeText(){

    const text = document.getElementById("inputText").value

    const language = document.getElementById("language").value

    const response = await fetch("/summarize",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            text,
            language
        })

    })

    const data = await response.json()

    document.getElementById("output").innerText = data.result
}


async function downloadPDF(){

    const content = document.getElementById("output").innerText

    const response = await fetch("/download",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            content
        })

    })

    const blob = await response.blob()

    const url = window.URL.createObjectURL(blob)

    const a = document.createElement("a")

    a.href = url

    a.download = "translated.pdf"

    a.click()
}


function copyText(){

    navigator.clipboard.writeText(
        document.getElementById("output").innerText
    )

    alert("Copied")
}


async function clearAll(){

    document.getElementById("inputText").value = ""

    document.getElementById("output").innerText = ""

    await fetch("/clear",{
        method:"POST"
    })
}


async function loadHistory(){

    const response = await fetch("/history")

    const data = await response.json()

    let html = "<h2>History</h2>"

    data.reverse().forEach(item=>{

        html += `
        <div class="history-item">
            <h3>${item.action}</h3>
            <p>${item.content}</p>
            <small>${item.time}</small>
        </div>
        `
    })

    document.getElementById("historyBox").innerHTML = html
}

</script>

</body>
</html>
