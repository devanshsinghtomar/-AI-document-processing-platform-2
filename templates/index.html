<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Docs</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<nav class="navbar">

    <div class="logo">
        <i class="fa-solid fa-file"></i>
        AI Docs
    </div>

    <div class="nav-right">

        <span class="username">
            {{ current_user.username }}
        </span>

        <a href="/logout" class="logout-btn">
            Logout
        </a>

    </div>

</nav>

<div class="container">

    <div class="upload-section">

        <input type="file" id="fileInput">

        <button onclick="uploadFile()">
            Upload
        </button>

    </div>

    <textarea id="textArea"
              placeholder="Enter document text here..."></textarea>

    <div class="button-group">

        <button onclick="summarizeText()">
            Summarize
        </button>

        <button onclick="translateText()">
            Translate
        </button>

        <button onclick="chatDoc()">
            Chat
        </button>

        <button onclick="convertDoc()">
            Convert
        </button>

        <button onclick="copyText()">
            Copy
        </button>

        <button onclick="clearText()">
            Clear
        </button>

    </div>

    <div class="history">

        <h3>History</h3>

        <ul id="historyList"></ul>

    </div>

    <div class="result-box"
         id="resultBox">

    </div>

</div>

<script>

function addHistory(action){

    let li = document.createElement("li");

    li.innerText = action;

    document.getElementById("historyList")
            .appendChild(li);
}

async function uploadFile(){

    let fileInput = document.getElementById("fileInput");

    let file = fileInput.files[0];

    let formData = new FormData();

    formData.append("file", file);

    let response = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    document.getElementById("resultBox")
            .innerText = data.filename;

    addHistory("Uploaded File");
}

async function summarizeText(){

    let text = document.getElementById("textArea").value;

    let response = await fetch("/summarize", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            text: text
        })
    });

    let data = await response.json();

    document.getElementById("resultBox")
            .innerText = data.result;

    addHistory("Summarized Text");
}

async function translateText(){

    let text = document.getElementById("textArea").value;

    let response = await fetch("/translate", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            text: text
        })
    });

    let data = await response.json();

    document.getElementById("resultBox")
            .innerText = data.result;

    addHistory("Translated Text");
}

async function chatDoc(){

    let text = document.getElementById("textArea").value;

    let response = await fetch("/chat", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            message: text
        })
    });

    let data = await response.json();

    document.getElementById("resultBox")
            .innerText = data.result;

    addHistory("Chat Used");
}

async function convertDoc(){

    let response = await fetch("/convert", {
        method: "POST"
    });

    let data = await response.json();

    document.getElementById("resultBox")
            .innerText = data.result;

    addHistory("Converted Document");
}

function clearText(){

    document.getElementById("textArea").value = "";

    document.getElementById("resultBox").innerText = "";

    addHistory("Cleared");
}

function copyText(){

    let text = document.getElementById("resultBox").innerText;

    navigator.clipboard.writeText(text);

    addHistory("Copied Result");
}

</script>

</body>
</html>
