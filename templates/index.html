<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuAI - AI Document Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', system-ui, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .upload-box {
            transition: all 0.3s ease;
        }
        .upload-box:hover {
            border-color: rgb(129 140 248);
            background: rgba(255,255,255,0.12);
        }
        
        .textarea-container {
            position: relative;
        }
        .mic-controls {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
    </style>
</head>
<body class="text-white">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Navbar -->
        <nav class="glass rounded-3xl px-8 py-5 flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-gradient-to-br from-indigo-500 to-cyan-400 rounded-2xl flex items-center justify-center">
                    <span class="text-white text-3xl font-bold">AI</span>
                </div>
                <h1 class="text-3xl font-bold tracking-tight">DocuAI</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <a href="/history" class="flex items-center gap-2 px-6 py-3 hover:bg-white/10 rounded-2xl transition">
                    <i class="fa-solid fa-clock-rotate-left"></i> History
                </a>
                <a href="/humanize" class="flex items-center gap-2 px-6 py-3 hover:bg-white/10 rounded-2xl transition">
                    <i class="fa-solid fa-pen-nib"></i> Humanize
                </a>
                <a href="/logout" class="flex items-center gap-2 px-6 py-3 hover:bg-red-500/10 hover:text-red-400 rounded-2xl transition">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
            </div>
        </nav>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
            <!-- LEFT: INPUT -->
            <div class="glass rounded-3xl p-8">
                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                    📂 Input Document
                </h2>

                <!-- Upload Area -->
                <div onclick="document.getElementById('fileInput').click()" 
                     class="upload-box border-2 border-dashed border-white/30 rounded-3xl p-16 text-center cursor-pointer mb-6">
                    <i class="fa-solid fa-cloud-arrow-up text-6xl text-indigo-400 mb-4"></i>
                    <h3 class="text-xl font-semibold">Drop files here</h3>
                    <p class="text-gray-400">or click to browse</p>
                    <p class="text-xs text-gray-500 mt-1">PDF, DOCX, TXT • Max 15MB</p>
                </div>

                <input type="file" id="fileInput" hidden accept=".pdf,.docx,.txt">

                <div class="textarea-container">
                    <textarea id="inputText" rows="14"
                        class="w-full bg-white/5 border border-white/10 focus:border-indigo-500 rounded-3xl p-6 text-white placeholder-gray-400 focus:outline-none text-base"
                        placeholder="Or paste your text here..."></textarea>
                    
                    <!-- Mic Controls -->
                    <div class="mic-controls">
                        <button onclick="toggleSpeechInput()" 
                                class="bg-emerald-600 hover:bg-emerald-500 w-11 h-11 rounded-2xl flex items-center justify-center transition">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                        <button onclick="stopSpeechInput()" 
                                class="bg-red-600 hover:bg-red-500 w-11 h-11 rounded-2xl flex items-center justify-center transition">
                            <i class="fa-solid fa-stop"></i>
                        </button>
                    </div>
                </div>

                <!-- Language -->
                <div class="mt-6">
                    <label class="block text-sm text-gray-400 mb-2">Target Language</label>
                    <select id="language" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-indigo-500">
                        <option value="hi">🇮🇳 Hindi</option>
                        <option value="en">🇬🇧 English</option>
                        <option value="fr">🇫🇷 French</option>
                        <option value="de">🇩🇪 German</option>
                        <option value="es">🇪🇸 Spanish</option>
                    </select>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-3 gap-3 mt-8">
                    <button onclick="uploadFile()" 
                            class="bg-gradient-to-r from-blue-600 to-cyan-500 py-4 rounded-2xl font-medium flex items-center justify-center gap-2">
                        <i class="fa-solid fa-upload"></i> Upload
                    </button>
                    <button onclick="translateText()" 
                            class="bg-gradient-to-r from-violet-600 to-fuchsia-500 py-4 rounded-2xl font-medium flex items-center justify-center gap-2">
                        <i class="fa-solid fa-language"></i> Translate
                    </button>
                    <button onclick="summarizeText()" 
                            class="bg-gradient-to-r from-emerald-600 to-teal-500 py-4 rounded-2xl font-medium flex items-center justify-center gap-2">
                        <i class="fa-solid fa-file-contract"></i> Summarize
                    </button>
                </div>
            </div>

            <!-- RIGHT: OUTPUT -->
            <div class="glass rounded-3xl p-8 flex flex-col">
                <h2 class="text-2xl font-semibold mb-6">🤖 AI Output</h2>
                
                <div id="outputText" class="flex-1 bg-white/5 border border-white/10 rounded-3xl p-8 overflow-auto text-gray-100 leading-relaxed whitespace-pre-wrap min-h-[400px]">
                    Your result will appear here...
                </div>

                <div class="flex gap-3 mt-6">
                    <button onclick="copyText()" 
                            class="flex-1 bg-white/10 hover:bg-white/20 py-4 rounded-2xl font-medium">📋 Copy</button>
                    <button onclick="downloadPDF()" 
                            class="flex-1 bg-gradient-to-r from-sky-500 to-blue-600 py-4 rounded-2xl font-medium">📥 Download PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== ALL YOUR ORIGINAL FUNCTIONS ====================

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) {
                alert('Please choose a file');
                return;
            }
            const formData = new FormData();
            formData.append('file', file);
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (data.error) {
                    alert(data.error);
                    return;
                }
                document.getElementById('inputText').value = data.text;
                document.getElementById('outputText').innerText = '✅ File uploaded successfully';
            } catch (error) {
                alert('Upload failed');
            }
        }

        async function translateText() {
            const text = document.getElementById('inputText').value;
            const language = document.getElementById('language').value;
            if (!text) {
                alert('Please enter text');
                return;
            }
            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, language: language })
                });
                const data = await response.json();
                document.getElementById('outputText').innerText = data.result;
            } catch (error) {
                alert('Translation Failed');
            }
        }

        async function summarizeText() {
            const text = document.getElementById('inputText').value;
            const language = document.getElementById('language').value;
            if (!text) {
                alert('Please enter text');
                return;
            }
            try {
                const response = await fetch('/summarize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, language: language })
                });
                const data = await response.json();
                document.getElementById('outputText').innerText = data.result;
            } catch (error) {
                alert('Summarization Failed');
            }
        }

        function copyText() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text);
            alert('Copied Successfully');
        }

        async function downloadPDF() {
            const text = document.getElementById('outputText').innerText;
            if (!text || text === 'Your result will appear here...') {
                alert('No content to download');
                return;
            }
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'output.pdf';
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                alert('Download failed');
            }
        }

        // Speech Input Functions
        let recognition;
        function toggleSpeechInput() {
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                alert("Speech recognition not supported");
                return;
            }
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = "en-US";
            recognition.onresult = function(event) {
                let transcript = "";
                for (let i = 0; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript + " ";
                }
                document.getElementById('inputText').value += transcript;
            };
            recognition.start();
        }

        function stopSpeechInput() {
            if (recognition) recognition.stop();
        }

        // File input change handler
        document.getElementById('fileInput').addEventListener('change', function() {
            if (this.files[0]) {
                document.getElementById('outputText').innerText = 'File selected: ' + this.files[0].name;
            }
        });
    </script>
</body>
</html>
