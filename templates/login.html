<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
overflow:hidden;
}

.container{
width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:30px;
padding:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.1);
animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
color:white;
text-align:center;
margin-bottom:10px;
font-size:36px;
}

p{
color:#cbd5e1;
text-align:center;
margin-bottom:25px;
}

.input-box{
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:14px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
}

.input-box input::placeholder{
color:#cbd5e1;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#3b82f6,#06b6d4);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
}

.bottom{
margin-top:20px;
text-align:center;
color:white;
}

.bottom a{
color:#38bdf8;
text-decoration:none;
}

.error{
background:#ef4444;
padding:10px;
border-radius:10px;
margin-bottom:15px;
color:white;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Welcome Back</h1>

<p>Login to continue</p>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form method="POST" action="/login">

<div class="input-box">
<input
type="email"
name="email"
placeholder="Enter Email"
required
>
</div>

<div class="input-box">
<input
type="password"
name="password"
placeholder="Enter Password"
required
>
</div>

<button type="submit">
Login
</button>

</form>

<div class="bottom">
Don't have an account?
<a href="/signup">Signup</a>
</div>

</div>

</body>
</html>
