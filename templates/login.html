<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #2563eb
            );

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            font-family: Arial, sans-serif;

            padding: 20px;
        }

        .container {

            background: rgba(255,255,255,0.1);

            backdrop-filter: blur(10px);

            border: 1px solid rgba(255,255,255,0.2);

            padding: 40px;

            border-radius: 20px;

            width: 100%;

            max-width: 400px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.3);

            color: white;
        }

        .logo {

            text-align: center;

            margin-bottom: 25px;
        }

        .logo i {

            font-size: 55px;

            color: #60a5fa;

            margin-bottom: 10px;
        }

        .logo h1 {

            font-size: 30px;

            font-weight: bold;
        }

        .subtitle {

            text-align: center;

            margin-bottom: 30px;

            color: #cbd5e1;

            font-size: 14px;
        }

        .input-group {

            position: relative;

            margin-bottom: 20px;
        }

        .input-group i {

            position: absolute;

            top: 50%;

            left: 15px;

            transform: translateY(-50%);

            color: #94a3b8;
        }

        input {

            width: 100%;

            padding: 14px 14px 14px 45px;

            border-radius: 12px;

            border: 1px solid rgba(255,255,255,0.2);

            background: rgba(255,255,255,0.08);

            color: white;

            font-size: 15px;

            outline: none;

            transition: 0.3s;
        }

        input::placeholder {

            color: #cbd5e1;
        }

        input:focus {

            border-color: #60a5fa;

            background: rgba(255,255,255,0.12);
        }

        button {

            width: 100%;

            padding: 14px;

            margin-top: 10px;

            background: linear-gradient(
                135deg,
                #2563eb,
                #3b82f6
            );

            color: white;

            border: none;

            border-radius: 12px;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            transform: translateY(-2px);

            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
        }

        .message {

            margin-top: 20px;

            text-align: center;

            font-size: 14px;

            padding: 12px;

            border-radius: 10px;

            display: none;
        }

        .error {

            background: rgba(239,68,68,0.2);

            color: #fecaca;

            border: 1px solid rgba(239,68,68,0.3);
        }

        .success {

            background: rgba(34,197,94,0.2);

            color: #bbf7d0;

            border: 1px solid rgba(34,197,94,0.3);
        }

        @media(max-width: 500px) {

            .container {

                padding: 30px 20px;
            }

            .logo h1 {

                font-size: 24px;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="logo">

            <i class="fa-solid fa-file-waveform"></i>

            <h1>AI Document Platform</h1>

        </div>

        <p class="subtitle">
            Secure Login Access
        </p>

        <form id="loginForm">

            <div class="input-group">

                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter Username"
                    required
                >

            </div>

            <div class="input-group">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    required
                >

            </div>

            <button type="submit">

                <i class="fa-solid fa-right-to-bracket"></i>
                Login

            </button>

        </form>

        <div
            id="message"
            class="message"
        ></div>

    </div>

    <script>

        const form = document.getElementById("loginForm");

        const messageBox = document.getElementById("message");

        form.addEventListener("submit", async function(e) {

            e.preventDefault();

            const username = document
                .getElementById("username")
                .value
                .trim();

            const password = document
                .getElementById("password")
                .value
                .trim();

            // Empty validation
            if (!username || !password) {

                showMessage(
                    "Please fill all fields",
                    "error"
                );

                return;
            }

            try {

                const response = await fetch("/login", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {

                    showMessage(
                        "Login Successful",
                        "success"
                    );

                    // Redirect to home/dashboard
                    setTimeout(() => {

                        window.location.href = "/";

                    }, 1000);

                } else {

                    showMessage(
                        data.error || "Invalid Credentials",
                        "error"
                    );
                }

            } catch (error) {

                showMessage(
                    "Server Error",
                    "error"
                );
            }
        });

        function showMessage(text, type) {

            messageBox.style.display = "block";

            messageBox.className = `message ${type}`;

            messageBox.innerText = text;
        }

    </script>

</body>

</html>
