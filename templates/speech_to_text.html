```html
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Speech To Text</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b,#020617);
            min-height:100vh;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:900px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border-radius:25px;
            padding:35px;
            box-shadow:0 0 30px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            font-size:35px;
            color:#38bdf8;
        }

        textarea{
            width:100%;
            height:300px;
            border:none;
            outline:none;
            border-radius:20px;
            padding:20px;
            font-size:16px;
            resize:none;
            background:#111827;
            color:white;
            margin-bottom:25px;
        }

        .btn-group{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        button{
            padding:16px;
            border:none;
            border-radius:15px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            color:white;
        }

        .start{
            background:linear-gradient(135deg,#10b981,#059669);
        }

        .stop{
            background:linear-gradient(135deg,#ef4444,#dc2626);
        }

        .clear{
            background:linear-gradient(135deg,#f59e0b,#d97706);
        }

        .back{
            background:linear-gradient(135deg,#3b82f6,#2563eb);
        }

        button:hover{
            transform:translateY(-3px);
            opacity:0.9;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🎤 Speech To Text</h1>

        <textarea id="output" placeholder="Your speech will appear here..."></textarea>

        <div class="btn-group">

            <button class="start" onclick="startRecognition()">
                🎙️ Start Listening
            </button>

            <button class="stop" onclick="stopRecognition()">
                ⏹️ Stop Listening
            </button>

            <button class="clear" onclick="clearText()">
                🗑️ Clear Text
            </button>

            <button class="back" onclick="goBack()">
                🔙 Back To Home
            </button>

        </div>

    </div>

<script>

    let recognition;

    function startRecognition(){

        recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();

        recognition.lang = "en-US";

        recognition.continuous = true;

        recognition.interimResults = true;

        recognition.onresult = function(event){

            let transcript = "";

            for(let i = 0; i < event.results.length; i++){

                transcript += event.results[i][0].transcript;
            }

            document.getElementById("output").value = transcript;
        };

        recognition.start();
    }

    function stopRecognition(){

        if(recognition){

            recognition.stop();
        }
    }

    function clearText(){

        document.getElementById("output").value = "";
    }

    function goBack(){

        window.location.href = "/";
    }

</script>

</body>
</html>
