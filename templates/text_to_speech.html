<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Text To Speech</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background: linear-gradient(135deg,#020617,#0f172a,#1e293b);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
            color:white;
        }

        .container{
            width:100%;
            max-width:900px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:25px;
            backdrop-filter:blur(12px);
            padding:35px;
            box-shadow:0 0 30px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            font-size:35px;
            color:#22c55e;
        }

        textarea{
            width:100%;
            height:300px;
            background:#111827;
            border:none;
            outline:none;
            border-radius:20px;
            padding:20px;
            color:white;
            font-size:16px;
            resize:none;
            margin-bottom:25px;
        }

        .btn-group{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        button{
            padding:16px;
            border:none;
            border-radius:15px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            color:white;
        }

        .start{
            background:linear-gradient(135deg,#10b981,#059669);
        }

        .pause{
            background:linear-gradient(135deg,#eab308,#ca8a04);
        }

        .stop{
            background:linear-gradient(135deg,#ef4444,#dc2626);
        }

        .back{
            background:linear-gradient(135deg,#3b82f6,#2563eb);
        }

        button:hover{
            transform:translateY(-3px);
            opacity:0.9;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🔊 Text To Speech</h1>

        <textarea id="textInput" placeholder="Enter text here..."></textarea>

        <div class="btn-group">

            <button class="start" onclick="startSpeech()">
                ▶️ Start Speech
            </button>

            <button class="pause" onclick="pauseSpeech()">
                ⏸️ Pause Speech
            </button>

            <button class="stop" onclick="stopSpeech()">
                ⏹️ Stop Speech
            </button>

            <button class="back" onclick="goBack()">
                🔙 Back To Home
            </button>

        </div>

    </div>

<script>

    let speech = new SpeechSynthesisUtterance();

    function startSpeech(){

        const text = document.getElementById("textInput").value;

        speech.text = text;

        speech.lang = "en-US";

        speech.rate = 1;

        speech.pitch = 1;

        window.speechSynthesis.speak(speech);
    }

    function pauseSpeech(){

        window.speechSynthesis.pause();
    }

    function stopSpeech(){

        window.speechSynthesis.cancel();
    }

    function goBack(){

        window.location.href = "/";
    }

</script>

</body>

</html>
