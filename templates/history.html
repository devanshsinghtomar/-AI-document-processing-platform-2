<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

.title{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.title h1{
font-size:38px;
}

.back-btn{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
text-decoration:none;
}

.history-card{
background:#1e293b;
padding:25px;
border-radius:20px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.1);
}

.history-card h2{
font-size:20px;
margin-bottom:10px;
color:#38bdf8;
}

.history-card p{
line-height:1.8;
color:#e2e8f0;
white-space:pre-wrap;
}

.history-card small{
display:block;
margin-top:15px;
color:#94a3b8;
}

.no-history{
text-align:center;
padding:100px 20px;
font-size:22px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<div class="title">

<h1>📜 History</h1>

<a href="/" class="back-btn">
⬅ Back
</a>

</div>

{% if records %}

{% for item in records %}

<div class="history-card">

<h2>{{ item.action }}</h2>

<p>{{ item.content }}</p>

<small>
{{ item.created_at.strftime("%d-%m-%Y %H:%M") }}
</small>

</div>

{% endfor %}

{% else %}

<div class="no-history">

No History Found

</div>

{% endif %}

</div>

</body>

</html>
