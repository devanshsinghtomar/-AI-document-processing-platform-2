<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
min-height:100vh;
padding:40px;
color:white;
}

.container{
max-width:1200px;
margin:auto;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.title{
font-size:42px;
font-weight:700;
}

.back-btn{
padding:14px 24px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#2563eb,#3b82f6);
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.back-btn:hover{
transform:translateY(-2px);
}

.history-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
padding:25px;
border-radius:24px;
transition:0.3s;
overflow:hidden;
}

.card:hover{
transform:translateY(-5px);
}

.action{
display:inline-block;
padding:8px 16px;
border-radius:50px;
font-size:13px;
font-weight:600;
margin-bottom:18px;
}

.Translate{
background:#2563eb;
}

.Summary{
background:#9333ea;
}

.Upload{
background:#059669;
}

.content{
font-size:15px;
line-height:1.8;
color:#e2e8f0;
max-height:220px;
overflow-y:auto;
white-space:pre-wrap;
}

.date{
margin-top:20px;
font-size:13px;
color:#94a3b8;
}

.empty{
text-align:center;
padding:80px 20px;
font-size:22px;
color:#cbd5e1;
}

@media(max-width:768px){

body{
padding:20px;
}

.title{
font-size:30px;
}

.top-bar{
flex-direction:column;
gap:20px;
align-items:flex-start;
}

}

</style>

</head>

<body>

<div class="container">

<div class="top-bar">

<h1 class="title">📜 History</h1>

<button class="back-btn"
onclick="window.location.href='/'">

⬅ Back

</button>

</div>

<div id="historyContainer" class="history-grid">

</div>

</div>

<script>

async function loadHistory(){

    try{

        const response = await fetch('/history');

        const data = await response.json();

        const container = document.getElementById('historyContainer');

        container.innerHTML = '';

        if(data.length === 0){

            container.innerHTML = `
            <div class="empty">
            No history found
            </div>
            `;

            return;
        }

        data.forEach(item=>{

            const card = document.createElement('div');

            card.className = 'card';

            card.innerHTML = `

            <div class="action ${item.action}">
            ${item.action}
            </div>

            <div class="content">
            ${item.content}
            </div>

            <div class="date">
            ${item.date}
            </div>

            `;

            container.appendChild(card);

        });

    }

    catch(error){

        console.error(error);

    }

}

loadHistory();

</script>

</body>

</html>
