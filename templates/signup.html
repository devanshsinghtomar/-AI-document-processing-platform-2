<!DOCTYPE html>
<html>

<head>

<title>Signup</title>

<style>

body {

    background: #0f172a;

    display: flex;

    justify-content: center;

    align-items: center;

    height: 100vh;

    font-family: Arial;
}

.container {

    background: white;

    padding: 40px;

    border-radius: 20px;

    width: 350px;
}

input {

    width: 100%;

    padding: 12px;

    margin-top: 15px;
}

button {

    width: 100%;

    padding: 12px;

    margin-top: 20px;

    background: #2563eb;

    color: white;

    border: none;
}

</style>

</head>

<body>

<div class="container">

<h1>Create Account</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Signup
</button>

</form>

</div>

</body>

</html>
