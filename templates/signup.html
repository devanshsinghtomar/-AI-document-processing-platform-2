<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DocuAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
            border-color: rgb(99 102 241);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-cyan-400 rounded-2xl flex items-center justify-center shadow-xl">
                    <span class="text-white text-3xl font-bold">AI</span>
                </div>
                <div>
                    <h1 class="text-3xl font-bold text-white tracking-tight">DocuAI</h1>
                </div>
            </div>
        </div>

        <!-- Main Card -->
        <div class="glass-card rounded-3xl p-10 shadow-2xl">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-semibold text-white">Create Your Account</h2>
                <p class="text-gray-400 mt-2">Join thousands using AI document processing</p>
            </div>

            {% if error %}
            <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-5 py-4 rounded-2xl mb-8 flex items-start gap-3">
                <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/signup" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <div class="relative">
                        <input 
                            type="text" 
                            name="username"
                            placeholder="johndoe"
                            required
                            class="input-field w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:outline-none"
                        >
                        <i class="fa-solid fa-user absolute right-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                    <div class="relative">
                        <input 
                            type="email" 
                            name="email"
                            placeholder="you@example.com"
                            required
                            class="input-field w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:outline-none"
                        >
                        <i class="fa-solid fa-envelope absolute right-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            name="password"
                            placeholder="Create a strong password"
                            required
                            class="input-field w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-gray-500 focus:outline-none"
                        >
                        <i class="fa-solid fa-lock absolute right-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>

                <button 
                    type="submit"
                    class="w-full bg-gradient-to-r from-indigo-600 via-blue-600 to-cyan-500 hover:from-indigo-500 hover:via-blue-500 hover:to-cyan-400 text-white font-semibold py-4 rounded-2xl text-lg transition-all duration-300 hover:scale-[1.02] shadow-lg shadow-indigo-500/40">
                    Create Account
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-8">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-gray-500 text-sm font-medium">OR</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Google Button -->
            <button onclick="alert('Google signup coming soon!')" 
                    class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white py-4 rounded-2xl flex items-center justify-center gap-3 transition font-medium">
                <i class="fa-brands fa-google text-lg"></i>
                Sign up with Google
            </button>

            <!-- Login Link -->
            <div class="text-center mt-8">
                <p class="text-gray-400">
                    Already have an account? 
                    <a href="/login" class="text-indigo-400 hover:text-indigo-300 font-medium transition">Sign in</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-xs mt-8">
            © 2026 DocuAI • Secure Document Processing
        </p>
    </div>
</body>
</html>
