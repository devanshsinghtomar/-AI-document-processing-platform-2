<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanize Text - DocuAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-6px);
        }
        
        textarea, .output-box {
            resize: none;
            scrollbar-width: thin;
        }
        
        .btn {
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="text-white">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Navbar -->
        <nav class="glass rounded-3xl px-8 py-5 flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-gradient-to-br from-indigo-500 to-cyan-400 rounded-2xl flex items-center justify-center">
                    <span class="text-white text-3xl font-bold">AI</span>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">DocuAI</h1>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <a href="/" class="flex items-center gap-2 px-6 py-3 hover:bg-white/10 rounded-2xl transition">
                    <i class="fa-solid fa-house"></i>
                    Home
                </a>
                <a href="/history" class="flex items-center gap-2 px-6 py-3 hover:bg-white/10 rounded-2xl transition">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    History
                </a>
                <a href="/logout" class="flex items-center gap-2 px-6 py-3 hover:bg-red-500/10 hover:text-red-400 rounded-2xl transition">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </a>
            </div>
        </nav>

        <!-- Header -->
        <div class="mb-10">
            <h1 class="text-5xl font-bold tracking-tight flex items-center gap-4">
                ✨ Humanize Text
            </h1>
            <p class="text-gray-400 text-xl mt-2">Transform robotic AI text into natural, human-like writing</p>
        </div>

        <!-- Status -->
        <div id="statusBar" class="glass rounded-2xl px-6 py-4 mb-8 flex items-center gap-3 text-pink-400 font-medium">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span>Ready to make your text sound more human</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- INPUT CARD -->
            <div class="glass rounded-3xl p-8 card">
                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-pen-nib text-pink-400"></i>
                    Input Text
                </h2>
                
                <textarea id="inputText" rows="16"
                    class="w-full bg-white/5 border border-white/10 focus:border-pink-500 rounded-3xl p-7 text-white placeholder-gray-400 focus:outline-none text-base leading-relaxed"
                    placeholder="Paste your AI-generated or robotic text here..."></textarea>

                <div class="mt-8 grid grid-cols-2 gap-4">
                    <button onclick="humanizeText()" 
                            class="btn bg-gradient-to-r from-pink-500 to-rose-500 py-5 rounded-2xl font-semibold flex items-center justify-center gap-3 text-lg">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        Humanize Text
                    </button>
                    <button onclick="clearText()" 
                            class="btn bg-gradient-to-r from-red-500 to-rose-600 py-5 rounded-2xl font-semibold flex items-center justify-center gap-3">
                        <i class="fa-solid fa-trash"></i>
                        Clear
                    </button>
                </div>

                <div id="loading" class="hidden mt-6 text-center text-pink-400 font-medium">
                    <i class="fa-solid fa-spinner fa-spin mr-2"></i>
                    Humanizing your text...
                </div>
            </div>

            <!-- OUTPUT CARD -->
            <div class="glass rounded-3xl p-8 card flex flex-col">
                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-file-lines text-cyan-400"></i>
                    Humanized Output
                </h2>
                
                <div id="outputText" 
                     class="flex-1 bg-white/5 border border-white/10 rounded-3xl p-8 overflow-auto text-gray-100 leading-relaxed text-[15.5px] whitespace-pre-wrap min-h-[420px]">
                    Your natural, human-like version will appear here...
                </div>

                <div class="flex gap-4 mt-8">
                    <button onclick="copyText()" 
                            class="flex-1 btn bg-white/10 hover:bg-white/20 py-5 rounded-2xl font-semibold flex items-center justify-center gap-3">
                        <i class="fa-solid fa-copy"></i>
                        Copy Output
                    </button>
                    <button onclick="goHome()" 
                            class="flex-1 btn bg-gradient-to-r from-blue-600 to-indigo-600 py-5 rounded-2xl font-semibold flex items-center justify-center gap-3">
                        <i class="fa-solid fa-house"></i>
                        Back to Home
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 hidden bg-gray-800 border border-gray-700 rounded-2xl px-6 py-4 shadow-2xl"></div>

    <script>
        function showToast(message, type = "success") {
            const toast = document.getElementById('toast');
            toast.innerHTML = `
                <div class="flex items-center gap-3">
                    <i class="fa-solid ${type === 'success' ? 'fa-check-circle text-green-400' : 'fa-exclamation-circle text-red-400'}"></i>
                    <span>${message}</span>
                </div>
            `;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function updateStatus(message) {
            document.getElementById('statusBar').innerHTML = `
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span>${message}</span>
            `;
        }

        async function humanizeText() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) {
                showToast("Please enter some text", "error");
                return;
            }

            document.getElementById('loading').classList.remove('hidden');
            updateStatus("Humanizing your text...");

            try {
                const response = await fetch('/humanize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                document.getElementById('outputText').innerText = data.result || "No result returned";
                updateStatus("✅ Humanization completed");
                showToast("Text humanized successfully!");
            } catch (error) {
                showToast("Humanization failed. Please try again.", "error");
                updateStatus("❌ Humanization failed");
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function copyText() {
            const text = document.getElementById('outputText').innerText;
            if (!text || text.includes("will appear here")) {
                showToast("No content to copy", "error");
                return;
            }
            navigator.clipboard.writeText(text);
            showToast("✅ Copied to clipboard!");
        }

        function clearText() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').innerText = 'Your natural, human-like version will appear here...';
            updateStatus("Ready to humanize text");
            showToast("Cleared");
        }

        function goHome() {
            window.location.href = '/';
        }

        // Keyboard shortcut: Ctrl + Enter to humanize
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                humanizeText();
            }
        });
    </script>
</body>
</html>
